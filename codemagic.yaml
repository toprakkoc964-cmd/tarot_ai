workflows:
  ios_build:
    name: iOS Build (Tarot AI)
    max_build_duration: 120
    environment:
      flutter: stable
      xcode: latest
    working_directory: flutter_app
    scripts:
      - name: Flutter pub get
        script: |
          flutter pub get
      - name: CocoaPods install
        script: |
          cd ios
          pod install
      - name: Flutter build ipa
        script: |
          flutter build ipa --release
    artifacts:
      - build/ios/ipa/*.ipa
      - build/ios/archive/*.xcarchive
